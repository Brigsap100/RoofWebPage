<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Contracts · Kodiak CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/crm.css"><link rel="icon" href="../assets/img/logo-seal.png"></head>
<body data-page="contracts">
<div class="app"><aside class="sidebar" id="sidebar"></aside><div class="main">
<header class="topbar"><div style="display:flex;align-items:center;gap:14px;"><button class="menu-toggle" aria-label="Menu"><svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button><div class="title"><h1>Service Contracts</h1><p>Preventative maintenance programs</p></div></div>
<div class="tools"><div class="search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input placeholder="Search…"></div><div class="avatar">BN</div></div></header>
<main class="content" id="content"></main></div></div>
<script src="js/data.js"></script>
<script>
/* Service contracts: PM programs, renewals & visit compliance */
KODIAK_CRM.ready.then(function () {
  var D = window.KODIAK_CRM;
  var esc = (window.CRM && window.CRM.esc) || function (s) {
    return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) {
      return { "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]; }); };
  var TODAY = new Date(); TODAY.setHours(0, 0, 0, 0);
  var NINETY_OUT = new Date(TODAY); NINETY_OUT.setDate(NINETY_OUT.getDate() + 90);

  var contracts = D.contracts || [];

  function parseDate(d) { return new Date(String(d).slice(0, 10) + "T00:00:00"); }
  function fmtDate(d) {
    if (!d) return "—";
    return parseDate(d).toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" });
  }
  function isoDate(d) {
    var p = function (n) { return (n < 10 ? "0" : "") + n; };
    return d.getFullYear() + "-" + p(d.getMonth() + 1) + "-" + p(d.getDate());
  }
  function renewalDue(c) {
    if (c.status === "expired" || !c.end) return false;
    var d = parseDate(c.end);
    return d <= NINETY_OUT;
  }
  function visitOverdue(c) {
    return c.nextVisitDue && parseDate(c.nextVisitDue) < TODAY;
  }

  var TIER_BADGE = { Platinum:"g", Gold:"y", Silver:"b" };
  var STATUS_BADGE = { active:"g", expiring:"y", expired:"r" };
  var CADENCE = { 12:"Monthly visits", 4:"Quarterly", 2:"Semi-annual", 1:"Annual" };
  function cadence(c) {
    return CADENCE[c.visitsPerYear] || (c.visitsPerYear + " visits / yr");
  }

  // ---- Stat tiles ------------------------------------------------------
  var ICON = {
    doc:'<path d="M6 2h9l5 5v15H6z"/><path d="M14 2v6h6M9 13h6M9 17h6"/>',
    money:'<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>',
    renew:'<path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 3v6h-6"/>',
    check:'<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/>'
  };
  function stat(icon, value, label) {
    return '<div class="stat"><div class="ic"><svg viewBox="0 0 24 24">' + icon + '</svg></div>' +
      '<div class="v mono">' + value + '</div><div class="l">' + label + '</div></div>';
  }
  function renderStats() {
    var sm = (typeof D.serviceMetrics === "function") ? D.serviceMetrics() : {};
    var active = contracts.filter(function (c) { return c.status === "active"; }).length;
    var renewals = contracts.filter(renewalDue).length;
    var live = contracts.filter(function (c) { return c.status !== "expired"; });
    var planned = live.reduce(function (s, c) { return s + (c.visitsPerYear || 0); }, 0);
    var done = live.reduce(function (s, c) { return s + (c.visitsCompleted || 0); }, 0);
    var compliance = planned ? Math.round(done / planned * 100) : 0;
    return '<div class="grid cols-4">' +
      stat(ICON.doc, sm.activeContracts != null ? sm.activeContracts : active, "Active Contracts") +
      stat(ICON.money, D.fmtShort(sm.mrr || 0), "Contract MRR") +
      stat(ICON.renew, renewals, "Renewals &le; 90 Days") +
      stat(ICON.check, compliance + "%", "PM Compliance") +
    '</div>';
  }

  // ---- Filter pills ----------------------------------------------------
  var FILTERS = [
    { key:"all",      label:"All" },
    { key:"active",   label:"Active" },
    { key:"expiring", label:"Expiring" },
    { key:"expired",  label:"Expired" }
  ];
  var filter = "all";
  function matchesFilter(c) {
    return filter === "all" || c.status === filter;
  }

  // ---- Table -----------------------------------------------------------
  function complianceBar(c, width) {
    var pct = c.visitsPerYear
      ? Math.max(0, Math.min(100, Math.round((c.visitsCompleted || 0) / c.visitsPerYear * 100)))
      : 0;
    return '<div class="bar" style="width:' + (width || "64px") + ';">' +
      '<span style="width:' + pct + '%;"></span></div>';
  }
  function rowHtml(c) {
    var termCell = esc(fmtDate(c.end)) +
      (renewalDue(c) ? ' <span class="badge r">renewal</span>' : '');
    var nextVisitCell = visitOverdue(c)
      ? '<span style="color:var(--bad);font-weight:600;">' + esc(fmtDate(c.nextVisitDue)) + ' · overdue</span>'
      : esc(fmtDate(c.nextVisitDue));
    return '<tr data-id="' + c.id + '" style="cursor:pointer;">' +
      '<td><div class="strong">' + esc(c.account) + '</div><div class="sub mono">' + esc(c.number) + '</div></td>' +
      '<td><span class="badge ' + (TIER_BADGE[c.tier] || "b") + '">' + esc(c.tier) + '</span></td>' +
      '<td>' + esc(cadence(c)) + '</td>' +
      '<td class="mono">' + esc(D.fmt(c.annualValue || 0)) + '</td>' +
      '<td>' + esc(c.billing) + '</td>' +
      '<td style="white-space:nowrap;">' + termCell + '</td>' +
      '<td style="white-space:nowrap;">' + nextVisitCell + '</td>' +
      '<td><span class="mono" style="font-size:.82rem;">' + esc(c.visitsCompleted) + '/' + esc(c.visitsPerYear) + '</span>' +
        '<div style="margin-top:5px;">' + complianceBar(c) + '</div></td>' +
    '</tr>';
  }
  function renderTableBody() {
    var rows = contracts.filter(matchesFilter);
    if (!rows.length) {
      return '<tr><td colspan="8"><div class="empty">No contracts match this filter.</div></td></tr>';
    }
    return rows.map(rowHtml).join("");
  }
  function renderCard() {
    return '<div class="card">' +
      '<div class="card-head">' +
        '<div><h3>Maintenance contracts</h3><p>' + contracts.length + ' preventative maintenance programs</p></div>' +
        '<div style="display:flex;gap:8px;flex-wrap:wrap;" id="filterPills">' +
          FILTERS.map(function (f) {
            return '<span class="pill" data-filter="' + f.key + '" role="button" tabindex="0">' + f.label + '</span>';
          }).join("") +
        '</div>' +
      '</div>' +
      '<div class="table-wrap"><table class="table"><thead><tr>' +
        '<th>Account / Contract</th><th>Tier</th><th>Cadence</th><th>Annual Value</th>' +
        '<th>Billing</th><th>Term End</th><th>Next Visit</th><th>Compliance</th>' +
      '</tr></thead><tbody id="contractBody">' + renderTableBody() + '</tbody></table></div>' +
    '</div>';
  }

  function paintPills() {
    document.querySelectorAll("#filterPills .pill").forEach(function (p) {
      var active = p.getAttribute("data-filter") === filter;
      if (active) {
        p.style.background = "var(--red)"; p.style.color = "#fff"; p.style.borderColor = "var(--red)";
      } else {
        p.style.background = ""; p.style.color = ""; p.style.borderColor = "";
      }
    });
  }
  function refreshAll() {
    document.getElementById("statRowWrap").innerHTML = renderStats();
    var body = document.getElementById("contractBody");
    if (body) body.innerHTML = renderTableBody();
  }

  // ---- Contract drawer ---------------------------------------------------
  function line(lbl, val) {
    return '<div class="field"><label>' + lbl + '</label><div style="color:var(--text);">' + esc(val) + '</div></div>';
  }
  function nextWoNumber() {
    var max = 0;
    (D.workOrders || []).forEach(function (w) {
      var n = Number(w && w.id);
      if (isFinite(n) && n > max) max = n;
    });
    return max + 1;
  }
  function accountHasNdl(accountId) {
    var list = (typeof D.roofAssetsFor === "function")
      ? D.roofAssetsFor(accountId)
      : (D.roofAssets || []).filter(function (r) { return r.accountId === accountId; });
    return list.some(function (r) {
      return String(r.warrantyType || "").indexOf("NDL") > -1;
    });
  }

  function openContract(id) {
    var c = contracts.find(function (x) { return x.id === id; });
    if (!c) return;
    var pct = c.visitsPerYear
      ? Math.max(0, Math.min(100, Math.round((c.visitsCompleted || 0) / c.visitsPerYear * 100)))
      : 0;
    var ndlNote = accountHasNdl(c.accountId)
      ? '<div class="sub" style="color:var(--gold-2);">Maintains manufacturer warranty compliance</div>'
      : '';

    window.CRM.openDrawer(
      '<div class="dh"><div><h3 class="mono" style="font-size:1.05rem;">' + esc(c.number) + '</h3>' +
        '<p style="color:var(--text-soft);font-size:.82rem;margin-top:6px;">' +
          '<span class="badge ' + (TIER_BADGE[c.tier] || "b") + '">' + esc(c.tier) + '</span> ' +
          '<span class="badge ' + (STATUS_BADGE[c.status] || "b") + '">' + esc(c.status) + '</span></p></div>' +
        '<button class="x">&times;</button></div>' +
      '<div class="db">' +
        line("Account", c.account) +
        line("Term", fmtDate(c.start) + " – " + fmtDate(c.end)) +
        line("Annual Value", D.fmt(c.annualValue || 0) + " · " + (c.billing || "—")) +
        '<div class="field"><label>Visits Progress</label>' +
          '<div style="color:var(--text);">' + esc(c.visitsCompleted) + ' of ' + esc(c.visitsPerYear) + ' complete</div>' +
          '<div style="margin-top:6px;">' + complianceBar(c, "100%") + '</div>' +
        '</div>' +
        '<div class="field"><label>Next Visit Due</label>' +
          '<div style="color:' + (visitOverdue(c) ? 'var(--bad)' : 'var(--text)') + ';">' +
            esc(fmtDate(c.nextVisitDue)) + (visitOverdue(c) ? ' · overdue' : '') + '</div></div>' +
        ndlNote +
        '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;" id="contractActions">' +
          '<button class="btn red" data-act="visit">Generate visit WO</button>' +
          '<button class="btn ghost" data-act="renew">Renew +1 yr</button>' +
        '</div>' +
        '<div id="contractMsg" style="display:none;color:var(--gold-2);font-size:.82rem;"></div>' +
      '</div>'
    );

    var box = document.getElementById("contractActions");
    if (box) box.addEventListener("click", function (e) {
      var btn = e.target.closest("[data-act]");
      if (!btn) return;
      var act = btn.getAttribute("data-act");
      var msg = document.getElementById("contractMsg");
      if (act === "visit") {
        if (!D.workOrders) D.workOrders = [];
        var nid = nextWoNumber();
        var wo = {
          id: nid,
          number: "WO-" + new Date().getFullYear() + "-" + nid,
          accountId: c.accountId,
          account: c.account,
          contractId: c.id,
          type: "Preventative Maintenance",
          priority: "Low",
          status: "scheduled",
          scheduledDate: c.nextVisitDue || new Date().toISOString().slice(0, 10),
          reportedAt: new Date().toISOString().slice(0, 19),
          tech: null,
          invoiceAmount: null,
          problem: "PM visit — " + c.number,
          photosBefore: 0,
          photosAfter: 0
        };
        D.workOrders.push(wo);
        var base = c.nextVisitDue ? parseDate(c.nextVisitDue) : new Date(TODAY);
        base.setDate(base.getDate() + Math.round(365 / (c.visitsPerYear || 4)));
        c.nextVisitDue = isoDate(base);
        refreshAll();
        if (msg) { msg.textContent = wo.number + " created"; msg.style.display = ""; }
      } else if (act === "renew") {
        var end = c.end ? parseDate(c.end) : new Date(TODAY);
        end.setFullYear(end.getFullYear() + 1);
        c.end = isoDate(end);
        c.status = "active";
        refreshAll();
        openContract(id);   // re-render drawer with the new term & status
      }
    });
  }

  // ---- Render + wire -------------------------------------------------------
  function render() {
    document.getElementById("content").innerHTML =
      '<div id="statRowWrap">' + renderStats() + '</div>' + renderCard();
    paintPills();
    var body = document.getElementById("contractBody");
    body.addEventListener("click", function (e) {
      var tr = e.target.closest("tr[data-id]");
      if (!tr) return;
      openContract(Number(tr.getAttribute("data-id")));
    });
    var pills = document.getElementById("filterPills");
    function pick(p) {
      filter = p.getAttribute("data-filter");
      paintPills();
      document.getElementById("contractBody").innerHTML = renderTableBody();
    }
    pills.addEventListener("click", function (e) {
      var p = e.target.closest(".pill"); if (p) pick(p);
    });
    pills.addEventListener("keydown", function (e) {
      if (e.key !== "Enter" && e.key !== " ") return;
      var p = e.target.closest(".pill"); if (!p) return;
      e.preventDefault(); pick(p);
    });
  }

  render();
  document.querySelector('.topbar .title p').textContent = "Preventative maintenance programs · " + D.source;
});
</script>
<script src="js/app.js"></script>
</body></html>
