<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accounts · Kodiak CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/crm.css"><link rel="icon" href="../assets/img/logo-seal.png"></head>
<body data-page="accounts">
<div class="app"><aside class="sidebar" id="sidebar"></aside><div class="main">
<header class="topbar"><div style="display:flex;align-items:center;gap:14px;"><button class="menu-toggle" aria-label="Menu"><svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button><div class="title"><h1>Accounts</h1><p>Clients, GCs &amp; property managers</p></div></div>
<div class="tools"><div class="search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input id="acctSearch" placeholder="Search…"></div><div class="avatar">BN</div></div></header>
<main class="content" id="content"></main></div></div>
<script src="js/data.js"></script>
<script>
(function () {
  var D = window.KODIAK_CRM;
  var esc = CRM.esc;
  var TYPES = ["Owner", "General Contractor", "Property Manager"];

  // ---- Build the main card + table ----------------------------------
  function render() {
    var rows = D.accounts.map(function (a) {
      return '<tr data-id="' + a.id + '" data-search="' +
          esc((a.name + ' ' + a.contact).toLowerCase()) + '" style="cursor:pointer;">' +
        '<td><div class="strong">' + esc(a.name) + '</div>' +
          '<div class="sub">' + esc(a.type) + '</div></td>' +
        '<td>' + esc(a.contact) + '<div class="sub">' + esc(a.title) + '</div></td>' +
        '<td>' + esc(a.city) + ', ' + esc(a.state) + '</td>' +
        '<td>' + esc(a.phone) + '</td>' +
        '<td>' + esc(a.email) + '</td>' +
        '<td>' + esc(a.owner) + '</td>' +
      '</tr>';
    }).join("");

    document.getElementById("content").innerHTML =
      '<div class="card">' +
        '<div class="card-head">' +
          '<div><h3>All Accounts</h3><p>' + D.accounts.length + ' active relationships</p></div>' +
          '<button class="btn red" id="newAccount">+ New Account</button>' +
        '</div>' +
        '<div class="table-wrap"><table class="table"><thead><tr>' +
          '<th>Account</th><th>Primary Contact</th><th>Location</th>' +
          '<th>Phone</th><th>Email</th><th>Owner</th>' +
        '</tr></thead><tbody id="acctRows">' + rows + '</tbody></table></div>' +
      '</div>';

    document.getElementById("newAccount").addEventListener("click", openNewAccount);
    document.querySelectorAll("#acctRows tr").forEach(function (tr) {
      tr.addEventListener("click", function () { openAccount(+tr.getAttribute("data-id")); });
    });
  }

  // ---- New Account form (demo) --------------------------------------
  function openNewAccount() {
    var typeOpts = TYPES.map(function (t) { return '<option>' + esc(t) + '</option>'; }).join("");
    var repOpts = D.reps.map(function (r) { return '<option>' + esc(r) + '</option>'; }).join("");
    CRM.openDrawer(
      '<div class="dh"><h3>New Account</h3><button class="x">&times;</button></div>' +
      '<div class="db">' +
        '<div class="field"><label>Name</label><input placeholder="Account name"></div>' +
        '<div class="field"><label>Type</label><select>' + typeOpts + '</select></div>' +
        '<div class="field"><label>Contact</label><input placeholder="Primary contact"></div>' +
        '<div class="field"><label>Title</label><input placeholder="Title"></div>' +
        '<div class="field"><label>City</label><input placeholder="City"></div>' +
        '<div class="field"><label>State</label><input placeholder="State"></div>' +
        '<div class="field"><label>Phone</label><input placeholder="Phone"></div>' +
        '<div class="field"><label>Email</label><input placeholder="Email"></div>' +
        '<div class="field"><label>Owner</label><select>' + repOpts + '</select></div>' +
        '<button class="btn red" id="saveAccount" style="justify-content:center;">Save Account</button>' +
      '</div>'
    );
    document.getElementById("saveAccount").addEventListener("click", function () { CRM.closeDrawer(); });
  }

  // ---- Account detail drawer ----------------------------------------
  function openAccount(id) {
    var a = D.account(id);
    if (!a) return;
    var opps = D.opportunities.filter(function (o) { return o.accountId === id; });
    var oppRows = opps.length ? opps.map(function (o) {
      var stage = D.STAGES.find(function (s) { return s.key === o.stage; });
      return '<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 0;border-bottom:1px solid var(--line);">' +
        '<div style="min-width:0;"><div class="strong" style="font-size:.9rem;">' + esc(o.name) + '</div>' +
          '<span class="badge ' + esc(o.stage) + '" style="margin-top:6px;">' + esc(stage ? stage.label : o.stage) + '</span></div>' +
        '<div class="mono" style="color:var(--gold-2);font-weight:700;white-space:nowrap;">' + D.fmt(o.value) + '</div>' +
      '</div>';
    }).join("") : '<div class="empty">No opportunities for this account.</div>';

    function line(lbl, val) {
      return '<div class="field"><label>' + lbl + '</label><div style="color:var(--text);">' + esc(val) + '</div></div>';
    }

    CRM.openDrawer(
      '<div class="dh"><div><h3>' + esc(a.name) + '</h3>' +
        '<p style="color:var(--text-soft);font-size:.82rem;">' + esc(a.type) + '</p></div>' +
        '<button class="x">&times;</button></div>' +
      '<div class="db">' +
        line("Primary Contact", a.contact + ' · ' + a.title) +
        line("Location", a.city + ', ' + a.state) +
        line("Phone", a.phone) +
        line("Email", a.email) +
        line("Account Owner", a.owner) +
        '<div class="section-title" style="margin-top:8px;"><h3 style="font-size:1rem;">Opportunities</h3>' +
          '<span class="pill">' + opps.length + '</span></div>' +
        '<div>' + oppRows + '</div>' +
      '</div>'
    );
  }

  // ---- Topbar search -------------------------------------------------
  function wireSearch() {
    var input = document.getElementById("acctSearch");
    input.addEventListener("input", function () {
      var q = input.value.trim().toLowerCase();
      document.querySelectorAll("#acctRows tr").forEach(function (tr) {
        tr.style.display = tr.getAttribute("data-search").indexOf(q) > -1 ? "" : "none";
      });
    });
  }

  window.openAccount = openAccount;
  document.addEventListener("DOMContentLoaded", function () { render(); wireSearch(); });
})();
</script>
<script src="js/app.js"></script>
</body></html>
