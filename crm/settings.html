<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings · Kodiak CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/crm.css"><link rel="icon" href="../assets/img/logo-seal.png">
<style>
  /* settings-specific layout */
  .set-radios{display:flex;flex-direction:column;gap:10px;margin:4px 0 4px;}
  .set-radio{display:flex;gap:12px;align-items:flex-start;background:var(--bg-2);border:1px solid var(--line);
    border-radius:10px;padding:13px 15px;cursor:pointer;transition:.18s;}
  .set-radio:hover{border-color:var(--gold);}
  .set-radio.sel{border-color:var(--red);background:linear-gradient(90deg,rgba(158,27,30,.16),rgba(158,27,30,.02));}
  .set-radio input{margin-top:3px;accent-color:var(--red);}
  .set-radio .rt{display:block;font-weight:600;font-size:.9rem;color:#fff;}
  .set-radio .rd{display:block;color:var(--text-soft);font-size:.8rem;margin-top:2px;}
  .set-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);}
  .set-row:last-child{border-bottom:none;}
  .set-row .rn{display:flex;align-items:center;gap:10px;font-weight:500;font-size:.9rem;}
  .set-row .rs{font-size:.82rem;font-weight:600;font-family:var(--sans);}
  .set-row .rs.ok{color:var(--ok);} .set-row .rs.bad{color:var(--bad);} .set-row .rs.wait{color:var(--text-soft);}
  .set-kv{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px solid var(--line);font-size:.9rem;}
  .set-kv:last-child{border-bottom:none;}
  .set-kv .k{color:var(--text-soft);} .set-kv .v{font-weight:600;color:#fff;text-align:right;}
  .set-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px;}
  .set-verdict{margin-top:14px;font-size:.88rem;font-weight:600;}
  .code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;background:var(--bg-2);border:1px solid var(--line);
    border-radius:8px;padding:3px 8px;font-size:.85rem;color:var(--gold-2);}
  .set-note{color:var(--text-soft);font-size:.84rem;line-height:1.55;}
  .set-note code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--gold-2);background:var(--bg-2);
    border:1px solid var(--line);border-radius:6px;padding:2px 6px;font-size:.82em;}
  .set-note ol{margin:10px 0 0 20px;display:flex;flex-direction:column;gap:8px;}
</style></head>
<body data-page="settings">
<div class="app"><aside class="sidebar" id="sidebar"></aside><div class="main">
<header class="topbar"><div style="display:flex;align-items:center;gap:14px;"><button class="menu-toggle" aria-label="Menu"><svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button><div class="title"><h1>Settings</h1><p>Data connection &amp; integration</p></div></div>
<div class="tools"><div class="search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input placeholder="Search…"></div><div class="avatar">BN</div></div></header>
<main class="content" id="content"></main></div></div>
<script src="js/data.js"></script>
<script>
/* Data-connection settings: control what data feeds the CRM */
KODIAK_CRM.ready.then(function () {
  var D = window.KODIAK_CRM;
  var esc = (window.CRM && window.CRM.esc) || function (s) {
    return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) {
      return { "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]; }); };

  var DEFAULT_BASE = "/api/rest";
  var ENTITIES = ["accounts","opportunities","projects","estimates","activities","leads"];
  var MODES = [
    { key:"auto", title:"Auto",  desc:"Try the live API first, fall back to demo data if it is unavailable. (Recommended)" },
    { key:"live", title:"Live",  desc:"Always load from the API. Data will be empty if the backend is not connected." },
    { key:"demo", title:"Demo",  desc:"Skip the API entirely and use the built-in sample dataset. Nothing is fetched." }
  ];

  // Effective values currently in force (data.js already applied any saved overrides).
  var currentMode = D.dataMode;
  var currentBase = D.API_BASE || DEFAULT_BASE;

  // Working copy of the mode selection for the radio group.
  var pickedMode = currentMode;

  function ls(key) { try { return localStorage.getItem(key); } catch (e) { return null; } }

  // Derive the lead-intake POST endpoint from the REST base (…/rest → …/lead).
  function leadEndpoint(base) {
    var b = (base || DEFAULT_BASE).trim().replace(/\/+$/, "");
    if (/\/rest$/.test(b)) return b.replace(/\/rest$/, "/lead");
    // Base doesn't end in /rest: absolute URLs get "<origin>/api/lead",
    // relative bases fall back to "/api/lead".
    if (/^https?:\/\//i.test(b)) {
      try { return new URL(b).origin + "/api/lead"; } catch (e) {}
    }
    return "/api/lead";
  }

  var ICON = {
    src:'<path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M4 4h16v16H4z"/>',
    test:'<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4L12 14.01l-3-3"/>',
    lead:'<path d="M22 6l-10 7L2 6"/><rect x="2" y="4" width="20" height="16" rx="2"/>',
    db:'<ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v6c0 1.66 4 3 9 3s9-1.34 9-3V5M3 11v6c0 1.66 4 3 9 3s9-1.34 9-3v-6"/>'
  };

  // ---- Card 1: Data source ------------------------------------------
  function sourceCard() {
    return '<div class="card">' +
      '<div class="card-head"><div style="display:flex;align-items:center;gap:12px;">' +
        '<div class="ic" style="width:40px;height:40px;border-radius:10px;background:rgba(198,161,91,.14);display:flex;align-items:center;justify-content:center;">' +
          '<svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:var(--gold-2);fill:none;stroke-width:1.8;">' + ICON.src + '</svg></div>' +
        '<div><h3>Data Source</h3><p>Where the CRM loads its records from</p></div></div></div>' +

      '<div class="set-kv"><span class="k">Active source</span><span class="v">' + esc(D.source) + '</span></div>' +
      '<div class="set-kv"><span class="k">Active mode</span><span class="v">' + esc(currentMode) + '</span></div>' +
      '<div class="set-kv"><span class="k">Effective API base</span><span class="v"><span class="code">' + esc(currentBase) + '</span></span></div>' +

      '<div style="margin-top:18px;">' +
        '<label style="font-size:.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:600;">Data mode</label>' +
        '<div class="set-radios" id="modeRadios">' +
          MODES.map(function (m) {
            return '<label class="set-radio' + (m.key === pickedMode ? " sel" : "") + '" data-mode="' + m.key + '">' +
              '<input type="radio" name="dataMode" value="' + m.key + '"' + (m.key === pickedMode ? " checked" : "") + '>' +
              '<span><span class="rt">' + esc(m.title) + '</span><span class="rd">' + esc(m.desc) + '</span></span>' +
            '</label>';
          }).join("") +
        '</div>' +
      '</div>' +

      '<div class="field" style="margin-top:14px;">' +
        '<label for="apiBase">API base URL</label>' +
        '<input id="apiBase" type="text" spellcheck="false" placeholder="' + DEFAULT_BASE + '" value="' + esc(currentBase) + '">' +
      '</div>' +

      '<div class="set-actions">' +
        '<button class="btn red" id="saveBtn">Save &amp; reload</button>' +
        '<button class="btn ghost" id="resetBtn">Reset to defaults</button>' +
      '</div>' +
    '</div>';
  }

  // ---- Card 2: Connection test --------------------------------------
  function testCard() {
    return '<div class="card">' +
      '<div class="card-head"><div style="display:flex;align-items:center;gap:12px;">' +
        '<div class="ic" style="width:40px;height:40px;border-radius:10px;background:rgba(198,161,91,.14);display:flex;align-items:center;justify-content:center;">' +
          '<svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:var(--gold-2);fill:none;stroke-width:1.8;">' + ICON.test + '</svg></div>' +
        '<div><h3>Connection test</h3><p>Ping each entity endpoint using the base above</p></div></div>' +
        '<button class="btn ghost" id="testBtn">Test connection</button></div>' +
      '<div id="testRows">' +
        ENTITIES.map(function (e) {
          return '<div class="set-row" data-entity="' + e + '">' +
            '<span class="rn">' + esc(e) + '</span>' +
            '<span class="rs wait">Not tested</span></div>';
        }).join("") +
      '</div>' +
      '<div class="set-verdict" id="testVerdict"></div>' +
    '</div>';
  }

  // ---- Card 3: Lead intake ------------------------------------------
  function leadCard() {
    var ep = leadEndpoint(currentBase);
    return '<div class="card">' +
      '<div class="card-head"><div style="display:flex;align-items:center;gap:12px;">' +
        '<div class="ic" style="width:40px;height:40px;border-radius:10px;background:rgba(198,161,91,.14);display:flex;align-items:center;justify-content:center;">' +
          '<svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:var(--gold-2);fill:none;stroke-width:1.8;">' + ICON.lead + '</svg></div>' +
        '<div><h3>Lead intake (website → CRM)</h3><p>How inbound leads reach this CRM</p></div></div></div>' +
      '<p class="set-note">The public site’s <strong>Contact</strong> form and <strong>Careers</strong> application both submit to the lead-intake endpoint. ' +
        'Each submission is written to the <code>Leads</code> table and then appears on the <a href="leads.html" style="color:var(--gold-2);">Leads</a> page ' +
        '(read back via <code>' + esc(currentBase) + '/leads</code>).</p>' +
      '<div class="set-kv" style="margin-top:12px;"><span class="k">Intake endpoint</span>' +
        '<span class="v"><span class="code">POST ' + esc(ep) + '</span></span></div>' +
      '<div class="set-actions">' +
        '<button class="btn ghost" id="leadTestBtn">Send test lead</button>' +
        '<span class="rs wait" id="leadTestResult" style="align-self:center;font-size:.84rem;font-weight:600;"></span>' +
      '</div>' +
      '<p class="set-note" style="margin-top:12px;">A test lead only persists once the backend and database are connected. ' +
        'Until then this POST will report a failure, which is expected in demo mode.</p>' +
    '</div>';
  }

  // ---- Card 4: Azure SQL setup (docs) -------------------------------
  function docsCard() {
    return '<div class="card">' +
      '<div class="card-head"><div style="display:flex;align-items:center;gap:12px;">' +
        '<div class="ic" style="width:40px;height:40px;border-radius:10px;background:rgba(198,161,91,.14);display:flex;align-items:center;justify-content:center;">' +
          '<svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:var(--gold-2);fill:none;stroke-width:1.8;">' + ICON.db + '</svg></div>' +
        '<div><h3>Azure SQL setup</h3><p>Connect a live database to the CRM</p></div></div></div>' +
      '<p class="set-note">The CRM reads live data through custom Azure Functions (<code>api/rest</code> for reads, <code>api/lead</code> for intake) backed by Azure SQL. To go live:</p>' +
      '<div class="set-note"><ol>' +
        '<li>In the Azure Static Web App, add an application setting named <code>DATABASE_CONNECTION_STRING</code> containing the Azure SQL connection string.</li>' +
        '<li>Provision the schema and sample rows by running <code>db/schema-seed.sql</code> against the database.</li>' +
        '<li>Leave the data mode on <strong>Auto</strong> (or set it to <strong>Live</strong>). On the next load the CRM detects the endpoint and auto-loads live data.</li>' +
      '</ol></div>' +
      '<p class="set-note" style="margin-top:12px;">Use <strong>Connection test</strong> above to confirm each entity responds before switching to Live mode.</p>' +
    '</div>';
  }

  function render() {
    document.getElementById("content").innerHTML =
      '<div class="grid cols-2">' + sourceCard() + testCard() + '</div>' +
      '<div class="grid cols-2">' + leadCard() + docsCard() + '</div>';
    wire();
  }

  function wire() {
    // radio selection highlight
    var radios = document.getElementById("modeRadios");
    radios.addEventListener("change", function (e) {
      var r = e.target.closest('input[name="dataMode"]');
      if (!r) return;
      pickedMode = r.value;
      radios.querySelectorAll(".set-radio").forEach(function (el) {
        el.classList.toggle("sel", el.getAttribute("data-mode") === pickedMode);
      });
    });

    // save + reload
    document.getElementById("saveBtn").addEventListener("click", function () {
      // Normalize: trim whitespace and strip trailing slashes so
      // "/api/rest/" is stored (and compared) as "/api/rest".
      var base = document.getElementById("apiBase").value.trim().replace(/\/+$/, "");
      try {
        localStorage.setItem("kodiakCrmDataMode", pickedMode);
        if (base && base !== DEFAULT_BASE) localStorage.setItem("kodiakCrmApiBase", base);
        else localStorage.removeItem("kodiakCrmApiBase");
      } catch (e) {}
      location.reload();
    });

    // reset to defaults
    document.getElementById("resetBtn").addEventListener("click", function () {
      try {
        localStorage.removeItem("kodiakCrmDataMode");
        localStorage.removeItem("kodiakCrmApiBase");
      } catch (e) {}
      location.reload();
    });

    // connection test
    document.getElementById("testBtn").addEventListener("click", runTest);

    // send test lead
    document.getElementById("leadTestBtn").addEventListener("click", sendTestLead);
  }

  function testBase() {
    var v = document.getElementById("apiBase").value.trim();
    return (v || DEFAULT_BASE).replace(/\/+$/, "");
  }

  function setRow(entity, cls, text) {
    var row = document.querySelector('#testRows .set-row[data-entity="' + entity + '"] .rs');
    if (row) { row.className = "rs " + cls; row.textContent = text; }
  }

  async function testEntity(base, entity) {
    try {
      var ctrl = new AbortController();
      var t = setTimeout(function () { ctrl.abort(); }, 4000);
      var r = await fetch(base + "/" + entity, { headers:{ "Accept":"application/json" }, signal: ctrl.signal });
      clearTimeout(t);
      if (!r.ok) throw new Error("HTTP " + r.status);
      var j = await r.json();
      var rows = j && (j.value || j);
      var count = Array.isArray(rows) ? rows.length : 0;
      setRow(entity, "ok", "OK · " + count + " rows");
      return true;
    } catch (e) {
      setRow(entity, "bad", "Failed · " + (e && e.message ? e.message : "no response"));
      return false;
    }
  }

  async function runTest() {
    var btn = document.getElementById("testBtn");
    var verdict = document.getElementById("testVerdict");
    var base = testBase();
    btn.disabled = true; btn.textContent = "Testing…";
    verdict.textContent = ""; verdict.className = "set-verdict";
    ENTITIES.forEach(function (e) { setRow(e, "wait", "Testing…"); });

    var results = [];
    for (var i = 0; i < ENTITIES.length; i++) {
      results.push(await testEntity(base, ENTITIES[i]));
    }
    var okCount = results.filter(Boolean).length;
    if (okCount === ENTITIES.length) {
      verdict.style.color = "var(--ok)";
      verdict.textContent = "✔ All endpoints responded — live data is available at " + base + ".";
    } else if (okCount === 0) {
      verdict.style.color = "var(--bad)";
      verdict.textContent = "✕ No endpoints responded. The API is not reachable at " + base + " — the CRM will use demo data.";
    } else {
      verdict.style.color = "var(--warn)";
      verdict.textContent = "⚠ " + okCount + " of " + ENTITIES.length + " endpoints responded at " + base + ".";
    }
    btn.disabled = false; btn.textContent = "Test connection";
  }

  async function sendTestLead() {
    var btn = document.getElementById("leadTestBtn");
    var out = document.getElementById("leadTestResult");
    var ep = leadEndpoint(testBase());
    var payload = {
      source: "website-contact",
      name: "Test Lead",
      company: "Kodiak Settings Check",
      email: "test.lead@example.com",
      phone: "000-000-0000",
      service: "Commercial Re-Roofing",
      position: "",
      message: "Test lead sent from the CRM Settings page connection check.",
      status: "new",
      createdDate: new Date().toISOString().slice(0, 10),
      owner: "Unassigned"
    };
    btn.disabled = true; btn.textContent = "Sending…";
    out.className = "rs wait"; out.textContent = "";
    try {
      var ctrl = new AbortController();
      var t = setTimeout(function () { ctrl.abort(); }, 4000);
      var r = await fetch(ep, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body: JSON.stringify(payload),
        signal: ctrl.signal
      });
      clearTimeout(t);
      if (!r.ok) throw new Error("HTTP " + r.status);
      out.className = "rs ok";
      out.textContent = "✔ Sent — check the Leads page.";
    } catch (e) {
      out.className = "rs bad";
      out.textContent = "✕ Failed (" + (e && e.message ? e.message : "no response") + ") — backend not connected yet, or this backend has no lead endpoint at " + ep + ".";
    }
    btn.disabled = false; btn.textContent = "Send test lead";
  }

  render();
});
</script>
<script src="js/app.js"></script>
</body></html>
