<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service · Kodiak CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/crm.css"><link rel="icon" href="../assets/img/logo-seal.png"></head>
<body data-page="service">
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:14px;">
        <button class="menu-toggle" aria-label="Menu"><svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
        <div class="title"><h1>Service</h1><p>Dispatch &amp; department overview</p></div>
      </div>
      <div class="tools">
        <div class="search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input placeholder="Search…"></div>
        <div class="avatar">BN</div>
      </div>
    </header>
    <main class="content" id="content"></main>
  </div>
</div>
<script src="js/data.js"></script>
<script>
/* Service department overview: dispatch queue, charts, PM visits, invoicing */
KODIAK_CRM.ready.then(function () {
  var D = window.KODIAK_CRM;
  var esc = (window.CRM && window.CRM.esc) || function (s) {
    return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) {
      return { "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]; });
  };
  var content = document.getElementById("content");

  var OPEN = ["new","scheduled","dispatched","in-progress","on-hold"];
  var STATUS_LABEL = { "new":"New","scheduled":"Scheduled","dispatched":"Dispatched","in-progress":"In Progress","on-hold":"On Hold" };
  var TIER_BADGE = { "Platinum":"g", "Gold":"y", "Silver":"b" };

  function openWOs() {
    return D.workOrders.filter(function (w) { return OPEN.indexOf(w.status) !== -1; });
  }
  // reportedAt/completedAt are naive-UTC "YYYY-MM-DDTHH:MM:SS" strings —
  // append "Z" so they parse as UTC (date-only strings stay as-is).
  function parseUTC(s) {
    if (!s) return null;
    s = String(s);
    return new Date(s.length <= 10 || /[Zz]|[+-]\d\d:?\d\d$/.test(s) ? s : s + "Z");
  }
  function fmtDate(d) {
    if (!d) return "—";
    var dt = String(d).indexOf("T") === -1 ? new Date(d + "T00:00:00") : parseUTC(d);
    return dt.toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" });
  }
  function fmtHM(h) {
    var mins = Math.max(0, Math.round(Math.abs(h) * 60));
    var H = Math.floor(mins / 60), M = mins % 60;
    return H > 0 ? H + "h " + M + "m" : M + "m";
  }
  function fmtSqft(n) {
    n = Number(n) || 0;
    if (n >= 1e6) return (n / 1e6).toFixed(1) + "M";
    if (n >= 1e3) return Math.round(n / 1e3) + "K";
    return String(n);
  }

  // ---- 1. Stat tiles -------------------------------------------------
  function statsHtml() {
    var m = D.serviceMetrics();
    // avg emergency response: reportedAt -> completedAt on completed Emergency-priority WOs
    var done = D.workOrders.filter(function (w) {
      return w.priority === "Emergency" && w.completedAt && w.reportedAt;
    });
    var avgResp = "—";
    if (done.length) {
      var total = 0;
      done.forEach(function (w) { total += (parseUTC(w.completedAt) - parseUTC(w.reportedAt)) / 36e5; });
      avgResp = (total / done.length).toFixed(1) + "h";
    }
    var ICON = {
      open:  '<path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>',
      resp:  '<path d="M12 8v4l3 2"/><circle cx="12" cy="12" r="9"/>',
      mrr:   '<path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>',
      sqft:  '<path d="M3 21h18M5 21V7l7-4 7 4v14"/><path d="M9 21v-6h6v6"/>'
    };
    var tiles = [
      { ic: ICON.open, v: String(m.openCount),        l: "Open Work Orders" },
      { ic: ICON.resp, v: avgResp,                    l: "Avg Emergency Response" },
      { ic: ICON.mrr,  v: D.fmtShort(m.mrr),          l: "Contract MRR" },
      { ic: ICON.sqft, v: fmtSqft(m.sqftUnderManagement), l: "Sq Ft Managed" }
    ];
    return '<div class="grid cols-4">' + tiles.map(function (t) {
      return '<div class="stat">' +
        '<div class="ic"><svg viewBox="0 0 24 24">' + t.ic + '</svg></div>' +
        '<div class="v mono">' + esc(t.v) + '</div>' +
        '<div class="l">' + esc(t.l) + '</div>' +
      '</div>';
    }).join("") + '</div>';
  }

  // ---- 2. Emergency & priority queue ---------------------------------
  function queueRows() {
    return openWOs()
      .filter(function (w) { return w.priority === "Emergency" || w.priority === "High"; })
      .map(function (w) { return { w: w, si: D.slaInfo(w) }; })
      .sort(function (a, b) {
        if (a.w.priority !== b.w.priority) return a.w.priority === "Emergency" ? -1 : 1;
        return a.si.remainH - b.si.remainH;
      });
  }
  function queueBody() {
    var rows = queueRows();
    if (!rows.length) return '<div class="empty">No emergency or high-priority work orders open. All clear.</div>';
    return '<div class="table-wrap"><table class="table"><thead><tr>' +
      '<th>Work Order</th><th>Account</th><th>Tech</th><th>Priority</th><th style="min-width:170px;">SLA</th>' +
    '</tr></thead><tbody>' +
      rows.map(function (r) {
        var w = r.w, si = r.si;
        var pct = Math.max(0, Math.min(si.pct, 100));
        var slaTxt = si.overdue
          ? '<span style="color:var(--bad);font-weight:600;">OVERDUE ' + esc(fmtHM(si.remainH)) + '</span>'
          : '<span style="color:var(--ok);font-weight:600;">' + esc(fmtHM(si.remainH)) + ' left</span>';
        var barBg = si.pct > 80 ? ";background:var(--bad)" : "";
        return '<tr>' +
          '<td><span class="strong">' + esc(w.number) + '</span><div class="sub">' + esc(w.problem || "") + '</div></td>' +
          '<td>' + esc(w.account) + '</td>' +
          '<td>' + esc(w.tech || "Unassigned") + '</td>' +
          '<td><span class="badge ' + (w.priority === "Emergency" ? "r" : "y") + '">' + esc(w.priority) + '</span></td>' +
          '<td>' + slaTxt +
            '<div class="bar" style="margin-top:6px;max-width:160px;"><span style="width:' + pct + '%' + barBg + '"></span></div></td>' +
        '</tr>';
      }).join("") +
    '</tbody></table></div>';
  }
  function queueCard() {
    return '<div class="card">' +
      '<div class="card-head"><div><h3>Emergency &amp; priority queue</h3><p>Open Emergency / High work orders tracked against SLA</p></div></div>' +
      '<div id="queueWrap">' + queueBody() + '</div>' +
    '</div>';
  }

  // ---- 3. Charts row ---------------------------------------------------
  function statusChart() {
    var counts = OPEN.map(function (s) {
      return { label: STATUS_LABEL[s], n: D.workOrders.filter(function (w) { return w.status === s; }).length };
    });
    var max = Math.max.apply(null, counts.map(function (c) { return c.n; })) || 1;
    return '<div class="card">' +
      '<div class="card-head"><div><h3>Open WOs by status</h3><p>Where open work sits right now</p></div></div>' +
      '<div class="chart-bars">' +
        counts.map(function (c) {
          var h = Math.max(4, Math.round(c.n / max * 100));
          return '<div class="cbar">' +
            '<div class="cv mono">' + c.n + '</div>' +
            '<div class="fill" style="height:' + h + '%"></div>' +
            '<div class="cl">' + esc(c.label) + '</div>' +
          '</div>';
        }).join("") +
      '</div></div>';
  }
  function agingChart() {
    var now = Date.now();
    var buckets = [
      { label: "0–2d",  min: 0,  max: 2,        n: 0 },
      { label: "3–7d",  min: 3,  max: 7,        n: 0 },
      { label: "8–14d", min: 8,  max: 14,       n: 0 },
      { label: "15+d",  min: 15, max: Infinity, n: 0 }
    ];
    openWOs().forEach(function (w) {
      var age = Math.max(0, Math.floor((now - parseUTC(w.reportedAt).getTime()) / 864e5));
      for (var i = 0; i < buckets.length; i++) {
        if (age >= buckets[i].min && age <= buckets[i].max) { buckets[i].n++; break; }
      }
    });
    var max = Math.max.apply(null, buckets.map(function (b) { return b.n; })) || 1;
    return '<div class="card">' +
      '<div class="card-head"><div><h3>Open WO aging</h3><p>Days since the problem was reported</p></div></div>' +
      '<div style="display:flex;flex-direction:column;gap:16px;">' +
        buckets.map(function (b) {
          var wPct = Math.max(3, Math.round(b.n / max * 100));
          return '<div>' +
            '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px;">' +
              '<span style="font-size:.86rem;font-weight:500;">' + esc(b.label) + '</span>' +
              '<span class="mono" style="color:var(--gold-2);font-weight:600;font-size:.82rem;">' + b.n + '</span>' +
            '</div>' +
            '<div class="bar"><span style="width:' + wPct + '%"></span></div>' +
          '</div>';
        }).join("") +
      '</div></div>';
  }

  // ---- 4. PM visits due -------------------------------------------------
  function pmDue() {
    var cutoff = new Date(); cutoff.setHours(0, 0, 0, 0); cutoff.setDate(cutoff.getDate() + 30);
    return D.contracts.filter(function (c) {
      if (c.status !== "active" && c.status !== "expiring") return false;
      if (!c.nextVisitDue) return false;
      return new Date(c.nextVisitDue + "T00:00:00") <= cutoff;
    }).sort(function (a, b) { return a.nextVisitDue < b.nextVisitDue ? -1 : a.nextVisitDue > b.nextVisitDue ? 1 : 0; });
  }
  function pmCard() {
    var rows = pmDue();
    var today = new Date(); today.setHours(0, 0, 0, 0);
    var body;
    if (!rows.length) {
      body = '<div class="empty">No PM visits due in the next 30 days.</div>';
    } else {
      body = '<div class="table-wrap"><table class="table"><tbody>' +
        rows.map(function (c) {
          var past = new Date(c.nextVisitDue + "T00:00:00") < today;
          return '<tr>' +
            '<td><span class="strong">' + esc(c.account) + '</span>' +
              '<div class="sub" style="margin-top:4px;"><span class="badge ' + (TIER_BADGE[c.tier] || "b") + '">' + esc(c.tier) + '</span></div></td>' +
            '<td class="mono" style="white-space:nowrap;' + (past ? "color:var(--bad);font-weight:600;" : "color:var(--text-soft);") + '">' + esc(fmtDate(c.nextVisitDue)) + '</td>' +
            '<td class="mono" style="color:var(--text-soft);white-space:nowrap;">' + esc(c.visitsCompleted + "/" + c.visitsPerYear) + '</td>' +
            '<td style="text-align:right;"><button class="btn ghost" style="padding:7px 13px;font-size:.78rem;" data-createwo="' + esc(String(c.id)) + '">Create WO</button></td>' +
          '</tr>';
        }).join("") +
      '</tbody></table></div>';
    }
    return '<div class="card">' +
      '<div class="card-head"><div><h3>PM visits due</h3><p>Contract visits due within 30 days</p></div></div>' +
      '<div id="pmMsg"></div>' + body +
    '</div>';
  }

  // ---- 5. Ready to invoice ------------------------------------------------
  function invoiceCard() {
    var rows = D.workOrders.filter(function (w) { return w.status === "completed"; })
      .sort(function (a, b) { return String(b.completedAt || "").localeCompare(String(a.completedAt || "")); });
    var body;
    if (!rows.length) {
      body = '<div class="empty">Nothing waiting to be invoiced.</div>';
    } else {
      body = '<div class="table-wrap"><table class="table"><tbody>' +
        rows.map(function (w) {
          var amt = w.invoiceAmount != null ? D.fmt(w.invoiceAmount) : (w.nte != null ? D.fmt(w.nte) : "—");
          return '<tr>' +
            '<td><span class="strong">' + esc(w.number) + '</span><div class="sub">' + esc(w.account) + '</div></td>' +
            '<td class="mono" style="color:var(--text-soft);white-space:nowrap;">' + esc(fmtDate(w.completedAt)) + '</td>' +
            '<td class="mono" style="color:var(--gold-2);font-weight:600;white-space:nowrap;">' + esc(amt) + '</td>' +
            '<td style="text-align:right;"><button class="btn ghost" style="padding:7px 13px;font-size:.78rem;" data-invoice="' + esc(String(w.id)) + '">Mark invoiced</button></td>' +
          '</tr>';
        }).join("") +
      '</tbody></table></div>';
    }
    return '<div class="card">' +
      '<div class="card-head"><div><h3>Ready to invoice</h3><p>Completed work orders awaiting billing</p></div></div>' +
      body +
    '</div>';
  }

  // ---- Page assembly & interactions ----------------------------------------
  function renderPage() {
    content.innerHTML =
      statsHtml() +
      queueCard() +
      '<div class="grid cols-2">' + statusChart() + agingChart() + '</div>' +
      '<div class="grid cols-2">' + pmCard() + invoiceCard() + '</div>';
  }

  function createWO(contractId) {
    var c = D.contracts.find(function (x) { return String(x.id) === String(contractId); });
    if (!c) return;
    var maxId = D.workOrders.reduce(function (m, w) { return Math.max(m, Number(w.id) || 0); }, 0);
    var id = maxId + 1;
    var wo = {
      id: id,
      number: "WO-" + new Date().getFullYear() + "-" + id,
      accountId: c.accountId,
      account: c.account,
      roofAssetId: null,
      contractId: c.id,
      type: "Preventative Maintenance",
      priority: "Low",
      status: "scheduled",
      problem: "Preventative maintenance visit (" + c.tier + " contract)",
      leakLocation: null,
      reportedAt: new Date().toISOString(),
      scheduledDate: c.nextVisitDue,
      completedAt: null,
      tech: null,
      nte: null,
      po: null,
      resolution: null,
      photosBefore: 0,
      photosAfter: 0,
      deficiencies: null,
      invoiceAmount: null
    };
    D.workOrders.push(wo);
    var d = new Date(c.nextVisitDue + "T00:00:00");
    d.setDate(d.getDate() + Math.round(365 / (c.visitsPerYear || 4)));
    c.nextVisitDue = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
    renderPage();
    var msg = document.getElementById("pmMsg");
    if (msg) {
      msg.innerHTML = '<div style="background:rgba(76,175,125,.12);border:1px solid rgba(76,175,125,.3);color:var(--ok);border-radius:9px;padding:9px 14px;font-size:.82rem;margin-bottom:14px;">' +
        esc(wo.number) + ' created — PM visit scheduled for ' + esc(c.account) + '.</div>';
      setTimeout(function () {
        var m2 = document.getElementById("pmMsg");
        if (m2) m2.innerHTML = "";
      }, 5000);
    }
  }

  content.addEventListener("click", function (e) {
    var cw = e.target.closest("[data-createwo]");
    if (cw) { createWO(cw.getAttribute("data-createwo")); return; }
    var inv = e.target.closest("[data-invoice]");
    if (inv) {
      var w = D.workOrders.find(function (x) { return String(x.id) === String(inv.getAttribute("data-invoice")); });
      if (w) { w.status = "invoiced"; renderPage(); }
    }
  });

  renderPage();
  // keep the SLA countdown live
  setInterval(function () {
    var wrap = document.getElementById("queueWrap");
    if (wrap) wrap.innerHTML = queueBody();
  }, 60000);

  document.querySelector('.topbar .title p').textContent = "Dispatch & department overview · " + D.source;
});
</script>
<script src="js/app.js"></script>
</body></html>
