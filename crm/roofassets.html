<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roof Assets · Kodiak CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/crm.css"><link rel="icon" href="../assets/img/logo-seal.png"></head>
<body data-page="roofassets">
<div class="app"><aside class="sidebar" id="sidebar"></aside><div class="main">
<header class="topbar"><div style="display:flex;align-items:center;gap:14px;"><button class="menu-toggle" aria-label="Menu"><svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button><div class="title"><h1>Roof Assets</h1><p>Portfolio under management</p></div></div>
<div class="tools"><div class="search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input placeholder="Search…"></div><div class="avatar">BN</div></div></header>
<main class="content" id="content"></main></div></div>
<script src="js/data.js"></script>
<script>
/* Roof-asset registry: every roof section under service management */
KODIAK_CRM.ready.then(function () {
  var D = window.KODIAK_CRM;
  var esc = (window.CRM && window.CRM.esc) || function (s) {
    return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) {
      return { "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]; }); };
  var TODAY = new Date(); TODAY.setHours(0, 0, 0, 0);
  var YEAR_OUT = new Date(TODAY); YEAR_OUT.setFullYear(YEAR_OUT.getFullYear() + 1);

  var assets = D.roofAssets || [];
  var contracts = D.contracts || [];
  var OPEN_WO = ["new", "scheduled", "dispatched", "in-progress", "on-hold"];
  var WO_BADGE = { "new":"b", "scheduled":"b", "dispatched":"y", "in-progress":"y",
                   "on-hold":"r", "completed":"g", "invoiced":"g", "cancelled":"r" };

  function assetsFor(accountId) {
    if (typeof D.roofAssetsFor === "function") return D.roofAssetsFor(accountId);
    return assets.filter(function (r) { return r.accountId === accountId; });
  }
  function woFor(accountId) {
    if (typeof D.workOrdersFor === "function") return D.workOrdersFor(accountId);
    return (D.workOrders || []).filter(function (w) { return w.accountId === accountId; });
  }

  function parseDate(d) { return new Date(String(d).slice(0, 10) + "T00:00:00"); }
  function fmtDate(d) {
    if (!d) return "—";
    return parseDate(d).toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" });
  }
  function warrantyExpiring(a) {
    if (!a.warrantyExpiry) return false;
    var d = parseDate(a.warrantyExpiry);
    return d >= TODAY && d <= YEAR_OUT;
  }
  function fmtSqft(n) {
    if (n >= 1e6) return (n / 1e6).toFixed(1) + "M";
    if (n >= 1e3) return Math.round(n / 1e3) + "K";
    return String(n);
  }

  // ---- Stat tiles ----------------------------------------------------
  var ICON = {
    building:'<path d="M3 21h18"/><path d="M5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16"/><path d="M9 7h1M14 7h1M9 11h1M14 11h1M9 15h1M14 15h1"/>',
    area:'<rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18"/>',
    shield:'<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>',
    alert:'<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><path d="M12 9v4M12 17h.01"/>'
  };
  function stat(icon, value, label) {
    return '<div class="stat"><div class="ic"><svg viewBox="0 0 24 24">' + icon + '</svg></div>' +
      '<div class="v mono">' + value + '</div><div class="l">' + label + '</div></div>';
  }
  function renderStats() {
    var buildings = {};
    assets.forEach(function (a) { buildings[a.building] = 1; });
    var sqft = assets.reduce(function (s, a) { return s + (a.sqft || 0); }, 0);
    var expiring = assets.filter(warrantyExpiring).length;
    var shortLife = assets.filter(function (a) { return a.remainingLife < 2; }).length;
    return '<div class="grid cols-4">' +
      stat(ICON.building, Object.keys(buildings).length, "Buildings Tracked") +
      stat(ICON.area, fmtSqft(sqft), "Sq Ft Managed") +
      stat(ICON.shield, expiring, "Warranties Expiring") +
      stat(ICON.alert, shortLife, "Sections &lt; 2 Yrs Life") +
    '</div>';
  }

  // ---- Filter pills ---------------------------------------------------
  var systems = [];
  assets.forEach(function (a) {
    if (a.system && systems.indexOf(a.system) === -1) systems.push(a.system);
  });
  var FILTERS = [
    { key:"all",      label:"All" },
    { key:"poor",     label:"Poor Condition" },
    { key:"warranty", label:"Warranty Expiring" }
  ].concat(systems.map(function (s) { return { key:"sys:" + s, label:s }; }));
  var filter = "all";

  function matchesFilter(a) {
    if (filter === "all") return true;
    if (filter === "poor") return a.condition <= 2;
    if (filter === "warranty") return warrantyExpiring(a);
    if (filter.indexOf("sys:") === 0) return a.system === filter.slice(4);
    return true;
  }

  // ---- Table -----------------------------------------------------------
  function conditionBar(condition, width) {
    var pct = Math.max(0, Math.min(5, condition)) * 20;
    var bg = condition <= 2
      ? 'background:linear-gradient(90deg,var(--bad),#e08585);'
      : '';
    return '<div class="bar" style="width:' + (width || 56) + 'px;margin-top:5px;">' +
      '<span style="width:' + pct + '%;' + bg + '"></span></div>';
  }
  function lifeBadge(yrs) {
    if (yrs < 2)  return '<span class="badge r">&lt;2 yrs</span>';
    if (yrs <= 5) return '<span class="badge y">' + esc(yrs) + ' yrs</span>';
    if (yrs <= 10)return '<span class="badge b">' + esc(yrs) + ' yrs</span>';
    return '<span class="badge g">10+ yrs</span>';
  }
  function warrantyCell(a) {
    var soon = warrantyExpiring(a);
    var expiry = a.warrantyExpiry
      ? '<div class="sub"' + (soon ? ' style="color:var(--warn);"' : '') + '>Expires ' + esc(fmtDate(a.warrantyExpiry)) + '</div>'
      : '<div class="sub">No expiry on file</div>';
    return '<span class="strong" style="font-size:.85rem;">' + esc(a.warrantyType || "—") + '</span>' + expiry;
  }
  function rowHtml(a) {
    return '<tr data-id="' + a.id + '" style="cursor:pointer;">' +
      '<td><div class="strong">' + esc(a.account) + '</div><div class="sub">' + esc(a.building) + '</div></td>' +
      '<td>' + esc(a.section) + '</td>' +
      '<td>' + esc(a.system) + '</td>' +
      '<td class="mono">' + Number(a.sqft || 0).toLocaleString("en-US") + '</td>' +
      '<td class="mono" style="color:var(--text-soft);">' + esc(a.installYear) + '</td>' +
      '<td><span class="mono">' + esc(a.condition) + '</span>' + conditionBar(a.condition) + '</td>' +
      '<td>' + lifeBadge(a.remainingLife) + '</td>' +
      '<td>' + warrantyCell(a) + '</td>' +
    '</tr>';
  }
  function renderTableBody() {
    var rows = assets.filter(matchesFilter);
    if (!rows.length) {
      return '<tr><td colspan="8"><div class="empty">No roof sections match this filter.</div></td></tr>';
    }
    return rows.map(rowHtml).join("");
  }
  function renderCard() {
    return '<div class="card">' +
      '<div class="card-head">' +
        '<div><h3>Roof sections</h3><p>' + assets.length + ' sections under management</p></div>' +
        '<div style="display:flex;gap:8px;flex-wrap:wrap;" id="filterPills">' +
          FILTERS.map(function (f) {
            return '<span class="pill" data-filter="' + esc(f.key) + '" role="button" tabindex="0">' + esc(f.label) + '</span>';
          }).join("") +
        '</div>' +
      '</div>' +
      '<div class="table-wrap"><table class="table"><thead><tr>' +
        '<th>Account / Building</th><th>Section</th><th>System</th><th>Sq Ft</th>' +
        '<th>Installed</th><th>Condition</th><th>Remaining Life</th><th>Warranty</th>' +
      '</tr></thead><tbody id="assetBody">' + renderTableBody() + '</tbody></table></div>' +
    '</div>';
  }

  function paintPills() {
    document.querySelectorAll("#filterPills .pill").forEach(function (p) {
      var active = p.getAttribute("data-filter") === filter;
      if (active) {
        p.style.background = "var(--red)"; p.style.color = "#fff"; p.style.borderColor = "var(--red)";
      } else {
        p.style.background = ""; p.style.color = ""; p.style.borderColor = "";
      }
    });
  }
  function refreshBody() {
    var body = document.getElementById("assetBody");
    if (body) body.innerHTML = renderTableBody();
  }

  // ---- Building drawer -------------------------------------------------
  function line(lbl, val) {
    return '<div class="field"><label>' + lbl + '</label><div style="color:var(--text);">' + esc(val) + '</div></div>';
  }
  function sectionTitle(label, count) {
    return '<div class="section-title" style="margin-top:8px;"><h3 style="font-size:1rem;">' + label + '</h3>' +
      (count != null ? '<span class="pill">' + count + '</span>' : '') + '</div>';
  }

  function openAsset(id) {
    var a = assets.find(function (x) { return x.id === id; });
    if (!a) return;
    var siblings = assetsFor(a.accountId);
    var history = woFor(a.accountId).slice().sort(function (x, y) {
      return String(y.reportedAt || "").localeCompare(String(x.reportedAt || ""));
    });
    var activeContract = contracts.find(function (c) {
      return c.accountId === a.accountId && (c.status === "active" || c.status === "expiring");
    });

    var TIER_BADGE = { Platinum:"g", Gold:"y", Silver:"b" };
    var contractChip = activeContract
      ? '<div style="display:flex;align-items:center;gap:8px;">' +
          '<span class="pill mono">' + esc(activeContract.number) + '</span>' +
          '<span class="badge ' + (TIER_BADGE[activeContract.tier] || "b") + '">' + esc(activeContract.tier) + '</span>' +
        '</div>'
      : '';

    var sectionRows = siblings.length ? siblings.map(function (s) {
      return '<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);">' +
        '<div style="min-width:0;"><div class="strong" style="font-size:.88rem;">' + esc(s.section) + '</div>' +
          '<div class="sub">' + esc(s.system) + ' · ' + Number(s.sqft || 0).toLocaleString("en-US") + ' sq ft</div></div>' +
        '<div style="flex:none;text-align:right;"><span class="mono" style="font-size:.82rem;">' + esc(s.condition) + '/5</span>' +
          conditionBar(s.condition, 64) + '</div>' +
      '</div>';
    }).join("") : '<div class="empty">No roof sections on file.</div>';

    var historyRows = history.length ? history.map(function (w) {
      var badge = WO_BADGE[w.status];
      return '<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);">' +
        '<div style="min-width:0;"><div class="strong mono" style="font-size:.85rem;">' + esc(w.number) + '</div>' +
          '<div class="sub">' + esc(w.type) + '</div></div>' +
        '<div style="flex:none;text-align:right;">' +
          '<span class="badge' + (badge ? ' ' + badge : '') + '">' + esc(w.status) + '</span>' +
          '<div class="sub" style="margin-top:5px;">' + esc(fmtDate(w.reportedAt)) + '</div></div>' +
      '</div>';
    }).join("") : '<div class="empty">No service history for this account.</div>';

    window.CRM.openDrawer(
      '<div class="dh"><div><h3>' + esc(a.building) + '</h3>' +
        '<p style="color:var(--text-soft);font-size:.82rem;">' + esc(a.account) + ' · ' + esc(a.address) + '</p></div>' +
        '<button class="x">&times;</button></div>' +
      '<div class="db">' +
        (contractChip ? '<div class="field"><label>Active Contract</label>' + contractChip + '</div>' : '') +
        line("Access Notes", a.accessNotes || "—") +
        sectionTitle("Sections at this account", siblings.length) +
        '<div>' + sectionRows + '</div>' +
        sectionTitle("Warranty") +
        line("Warranty Type", a.warrantyType || "—") +
        line("Warranty Expires", a.warrantyExpiry ? fmtDate(a.warrantyExpiry) : "No expiry on file") +
        sectionTitle("Service history", history.length) +
        '<div>' + historyRows + '</div>' +
      '</div>'
    );
  }

  // ---- Render + wire ----------------------------------------------------
  function render() {
    document.getElementById("content").innerHTML = renderStats() + renderCard();
    paintPills();
    var body = document.getElementById("assetBody");
    body.addEventListener("click", function (e) {
      var tr = e.target.closest("tr[data-id]");
      if (!tr) return;
      openAsset(Number(tr.getAttribute("data-id")));
    });
    var pills = document.getElementById("filterPills");
    function pick(p) { filter = p.getAttribute("data-filter"); paintPills(); refreshBody(); }
    pills.addEventListener("click", function (e) {
      var p = e.target.closest(".pill"); if (p) pick(p);
    });
    pills.addEventListener("keydown", function (e) {
      if (e.key !== "Enter" && e.key !== " ") return;
      var p = e.target.closest(".pill"); if (!p) return;
      e.preventDefault(); pick(p);
    });
  }

  render();
  document.querySelector('.topbar .title p').textContent = "Portfolio under management · " + D.source;
});
</script>
<script src="js/app.js"></script>
</body></html>
