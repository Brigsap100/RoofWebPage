<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects · Kodiak CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/crm.css"><link rel="icon" href="../assets/img/logo-seal.png"></head>
<body data-page="projects">
<div class="app"><aside class="sidebar" id="sidebar"></aside><div class="main">
<header class="topbar"><div style="display:flex;align-items:center;gap:14px;"><button class="menu-toggle" aria-label="Menu"><svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button><div class="title"><h1>Projects</h1><p>Won jobs in delivery</p></div></div>
<div class="tools"><div class="search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input placeholder="Search…"></div><div class="avatar">BN</div></div></header>
<main class="content" id="content"></main></div></div>
<script src="js/data.js"></script><script>
(function () {
  var D = window.KODIAK_CRM;
  var esc = (window.CRM && window.CRM.esc) || function (s) {
    return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) {
      return { "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]; });
  };
  var commas = function (n) { return Number(n).toLocaleString("en-US"); };

  // ---- Stat row -----------------------------------------------------
  var active = D.projects.filter(function (p) { return p.status !== "Complete"; }).length;
  var totalValue = D.projects.reduce(function (s, p) { return s + p.value; }, 0);
  var avgPct = Math.round(D.projects.reduce(function (s, p) { return s + p.pct; }, 0) / D.projects.length);
  var totalSqft = D.projects.reduce(function (s, p) { return s + p.sqft; }, 0);

  var ICONS = {
    active:  '<path d="M3 7h18v13H3z"/><path d="M8 7V4h8v3"/>',
    value:   '<path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>',
    pct:     '<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
    sqft:    '<path d="M3 3h18v18H3z"/><path d="M3 9h18M9 3v18"/>'
  };
  function stat(icon, value, label) {
    return '<div class="stat"><div class="ic"><svg viewBox="0 0 24 24">' + icon + '</svg></div>' +
      '<div class="v mono">' + value + '</div><div class="l">' + label + '</div></div>';
  }
  var statRow = '<div class="grid cols-4">' +
    stat(ICONS.active, active, "Active Projects") +
    stat(ICONS.value, D.fmtShort(totalValue), "Total Contract Value") +
    stat(ICONS.pct, avgPct + "%", "Avg Completion") +
    stat(ICONS.sqft, commas(totalSqft) + " sq ft", "Sq Ft Under Contract") +
    '</div>';

  // ---- Project cards ------------------------------------------------
  var BADGE = { "Complete":"g", "In Progress":"y", "Scheduled":"b" };
  function fact(label, value) {
    return '<div class="fact"><div class="fl">' + label + '</div>' +
      '<div class="fv">' + value + '</div></div>';
  }
  function card(p) {
    var acct = D.account(p.accountId);
    var acctName = acct ? acct.name : "—";
    var badge = BADGE[p.status] || "b";
    return '<div class="card project-card">' +
      '<div class="card-head" style="margin-bottom:6px;align-items:flex-start;">' +
        '<h3>' + esc(p.name) + '</h3>' +
        '<span class="badge ' + badge + '">' + esc(p.status) + '</span>' +
      '</div>' +
      '<p class="proj-acct">' + esc(acctName) + '</p>' +
      '<div class="fact-grid">' +
        fact("Value", D.fmt(p.value)) +
        fact("Sq Ft", commas(p.sqft)) +
        fact("System", esc(p.system)) +
        fact("PM", esc(p.pm)) +
      '</div>' +
      '<div class="proj-progress">' +
        '<div class="proj-progress-head"><span>Completion</span><span class="mono">' + p.pct + '% complete</span></div>' +
        '<div class="bar"><span style="width:' + p.pct + '%"></span></div>' +
      '</div>' +
      '<div class="proj-foot"><span>' + esc(p.start) + '</span><span class="proj-arrow">–</span><span>' + esc(p.end) + '</span></div>' +
    '</div>';
  }
  var cards = '<div class="grid cols-2">' + D.projects.map(card).join("") + '</div>';

  document.getElementById("content").innerHTML = statRow + cards;
})();
</script>
<style>
  .proj-acct{color:var(--text-soft);font-size:.85rem;margin-bottom:18px;}
  .fact-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 18px;padding:16px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);}
  .fact .fl{font-size:.68rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:600;margin-bottom:4px;}
  .fact .fv{font-size:.92rem;color:var(--text);font-weight:500;}
  .proj-progress{margin-top:18px;}
  .proj-progress-head{display:flex;align-items:center;justify-content:space-between;font-size:.78rem;color:var(--text-soft);margin-bottom:8px;}
  .proj-progress-head span:last-child{color:var(--gold-2);font-weight:600;}
  .proj-foot{display:flex;align-items:center;gap:10px;margin-top:18px;padding-top:16px;border-top:1px solid var(--line);font-size:.82rem;color:var(--text-soft);}
  .proj-foot .proj-arrow{color:var(--muted);}
</style>
<script src="js/app.js"></script>
</body></html>
