<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard · Kodiak CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/crm.css">
<link rel="icon" href="../assets/img/logo-seal.png">
</head>
<body data-page="dashboard">
<div class="app">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:14px;">
        <button class="menu-toggle" aria-label="Menu"><svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
        <div class="title"><h1>Dashboard</h1><p>Sales overview · commercial roofing</p></div>
      </div>
      <div class="tools">
        <div class="search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input placeholder="Search…"></div>
        <div class="avatar">BN</div>
      </div>
    </header>
    <main class="content" id="content"></main>
  </div>
</div>
<script src="js/data.js"></script>
<script>
  /* Build the dashboard into #content using window.KODIAK_CRM */
  KODIAK_CRM.ready.then(function () {
  (function () {
    var D = window.KODIAK_CRM;
    var esc = (window.CRM && window.CRM.esc) || function (s) {
      return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) {
        return { "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]; });
    };
    var content = document.getElementById("content");

    // ---- 1. Stat tiles -------------------------------------------------
    var m = D.metrics();
    var ICON = {
      pipeline: '<path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/>',
      forecast: '<path d="M12 2v20M2 12h20"/><circle cx="12" cy="12" r="9"/>',
      won:      '<path d="M20 6L9 17l-5-5"/>',
      rate:     '<path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 12l7-7"/>'
    };
    var stats = [
      { ic: ICON.pipeline, v: D.fmtShort(m.pipelineValue), l: "Open Pipeline",      delta: "▲ 12%", up: true },
      { ic: ICON.forecast, v: D.fmtShort(m.weighted),      l: "Weighted Forecast",  delta: "▲ 8%",  up: true },
      { ic: ICON.won,      v: D.fmtShort(m.wonValue),      l: "Won (YTD)",          delta: "▲ 21%", up: true },
      { ic: ICON.rate,     v: m.winRate + "%",             l: "Win Rate",           delta: "▼ 4%",  up: false }
    ];
    var statsHtml =
      '<div class="grid cols-4">' +
      stats.map(function (s) {
        return '<div class="stat">' +
          '<span class="delta ' + (s.up ? "up" : "down") + '">' + esc(s.delta) + '</span>' +
          '<div class="ic"><svg viewBox="0 0 24 24">' + s.ic + '</svg></div>' +
          '<div class="v mono">' + esc(s.v) + '</div>' +
          '<div class="l">' + esc(s.l) + '</div>' +
        '</div>';
      }).join("") +
      '</div>';

    // ---- 2. Charts row -------------------------------------------------
    var stages = D.byStage();
    var maxStage = Math.max.apply(null, stages.map(function (s) { return s.value; })) || 1;
    var byStageHtml =
      '<div class="card">' +
        '<div class="card-head"><div><h3>Pipeline by stage</h3><p>Open opportunity value per stage</p></div></div>' +
        '<div class="chart-bars">' +
          stages.map(function (s) {
            var h = Math.max(4, Math.round(s.value / maxStage * 100));
            return '<div class="cbar">' +
              '<div class="cv mono">' + esc(D.fmtShort(s.value)) + '</div>' +
              '<div class="fill" style="height:' + h + '%"></div>' +
              '<div class="cl">' + esc(s.label) + '</div>' +
            '</div>';
          }).join("") +
        '</div>' +
      '</div>';

    // Pipeline by service — aggregate OPEN opps grouped by service
    var openOpps = D.opportunities.filter(function (o) { return o.stage !== "won" && o.stage !== "lost"; });
    var svcMap = {};
    openOpps.forEach(function (o) { svcMap[o.service] = (svcMap[o.service] || 0) + o.value; });
    var svcRows = Object.keys(svcMap).map(function (k) { return { service: k, value: svcMap[k] }; })
      .sort(function (a, b) { return b.value - a.value; });
    var maxSvc = Math.max.apply(null, svcRows.map(function (r) { return r.value; })) || 1;
    var byServiceHtml =
      '<div class="card">' +
        '<div class="card-head"><div><h3>Pipeline by service</h3><p>Open value grouped by service line</p></div></div>' +
        '<div style="display:flex;flex-direction:column;gap:16px;">' +
          svcRows.map(function (r) {
            var w = Math.max(3, Math.round(r.value / maxSvc * 100));
            return '<div>' +
              '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px;">' +
                '<span style="font-size:.86rem;font-weight:500;">' + esc(r.service) + '</span>' +
                '<span class="mono" style="color:var(--gold-2);font-weight:600;font-size:.82rem;">' + esc(D.fmtShort(r.value)) + '</span>' +
              '</div>' +
              '<div class="bar"><span style="width:' + w + '%"></span></div>' +
            '</div>';
          }).join("") +
        '</div>' +
      '</div>';

    var chartsHtml = '<div class="grid cols-2">' + byStageHtml + byServiceHtml + '</div>';

    // ---- 3. Top open opportunities ------------------------------------
    var topOpps = openOpps.slice().sort(function (a, b) { return b.value - a.value; }).slice(0, 6);
    var stageLabel = {};
    D.STAGES.forEach(function (s) { stageLabel[s.key] = s.label; });
    function fmtDate(d) {
      var dt = new Date(d + "T00:00:00");
      return dt.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
    }
    var topOppsHtml =
      '<div class="card">' +
        '<div class="card-head"><div><h3>Top open opportunities</h3><p>Highest-value deals in play</p></div></div>' +
        '<div class="table-wrap"><table class="table"><thead><tr>' +
          '<th>Opportunity</th><th>Stage</th><th>Value</th><th>Close Date</th><th>Owner</th>' +
        '</tr></thead><tbody>' +
          topOpps.map(function (o) {
            return '<tr>' +
              '<td><span class="strong">' + esc(o.name) + '</span><div class="sub">' + esc(o.account) + '</div></td>' +
              '<td><span class="badge ' + esc(o.stage) + '">' + esc(stageLabel[o.stage] || o.stage) + '</span></td>' +
              '<td class="mono">' + esc(D.fmt(o.value)) + '</td>' +
              '<td>' + esc(fmtDate(o.closeDate)) + '</td>' +
              '<td>' + esc(o.owner) + '</td>' +
            '</tr>';
          }).join("") +
        '</tbody></table></div>' +
      '</div>';

    // ---- 4. Upcoming activities ---------------------------------------
    var typeBadge = { "Call": "b", "Email": "b", "Meeting": "y", "Site Visit": "g" };
    var upcoming = D.activities.filter(function (a) { return !a.done; })
      .sort(function (a, b) { return a.due < b.due ? -1 : a.due > b.due ? 1 : 0; })
      .slice(0, 6);
    var activitiesHtml =
      '<div class="card">' +
        '<div class="card-head"><div><h3>Upcoming activities</h3><p>Next actions across the team</p></div></div>' +
        '<div class="table-wrap"><table class="table"><tbody>' +
          upcoming.map(function (a) {
            return '<tr>' +
              '<td style="width:130px;"><span class="badge ' + (typeBadge[a.type] || "b") + '">' + esc(a.type) + '</span></td>' +
              '<td><span class="strong">' + esc(a.subject) + '</span><div class="sub">' + esc(a.account) + '</div></td>' +
              '<td class="mono" style="text-align:right;color:var(--text-soft);">' + esc(fmtDate(a.due)) + '</td>' +
            '</tr>';
          }).join("") +
        '</tbody></table></div>' +
      '</div>';

    var bottomHtml = '<div class="grid cols-2">' + topOppsHtml + activitiesHtml + '</div>';

    content.innerHTML = statsHtml + chartsHtml + bottomHtml;
  })();
  document.querySelector('.topbar .title p').textContent = "Sales overview · " + KODIAK_CRM.source;
  });
</script>
<script src="js/app.js"></script>
</body>
</html>
